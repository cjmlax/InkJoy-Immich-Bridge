# Immich -> InkJoy bridge
#
# Method A (this file): build from the files in this stack folder.
#   Put compose.yaml, Dockerfile, the app/ folder, and your .env in the
#   same Dockge stack directory, then Deploy.
#
# Method B (build straight from GitHub): replace the `build:` line below with
#   build: https://github.com/YOUR_USER/immich-inkjoy-bridge.git#main
#   ...and you don't need the Dockerfile/app/ files in the stack folder at all.
#   (Public repos work out of the box; private repos need a registry instead.)

services:
  inkjoy-bridge:
    build: .
    # build: https://github.com/YOUR_USER/immich-inkjoy-bridge.git#main
    container_name: inkjoy-bridge
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=${TIMEZONE:-America/New_York}
    volumes:
      - inkjoy-state:/data        # persists the sync fingerprint so it only re-uploads on change

    # The container needs to reach BOTH your Immich server (LAN) and the
    # InkJoy cloud (internet). Default bridge networking handles both as long
    # as IMMICH_URL points at a reachable host/IP (e.g. http://192.168.1.10:2283/api).
    #
    # If you'd rather reference Immich by its container name, attach this
    # service to Immich's network instead:
    #
    # networks:
    #   - immich_default
    #
# networks:
#   immich_default:
#     external: true

volumes:
  inkjoy-state:
